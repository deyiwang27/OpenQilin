version: 0.1.0
rules:
  - id: AUTH-001
    title: Actor identity required
    severity: critical
    statement: Every action request MUST include actor id and role.
    enforced_by: policy_engine
  - id: AUTH-002
    title: Authority matrix enforcement
    severity: critical
    statement: Actions outside authority matrix MUST be denied.
    enforced_by: policy_engine
  - id: GOV-001
    title: Governance non-bypass
    severity: critical
    statement: Executive and operational agents MUST NOT override governance enforcement actions.
    enforced_by: policy_engine
  - id: BUD-001
    title: Hard budget stop
    severity: critical
    statement: Execution at or above hard threshold MUST be blocked or paused.
    enforced_by: policy_engine
  - id: SAF-001
    title: Safety containment priority
    severity: high
    statement: Safety containment actions take priority over normal execution.
    enforced_by: task_orchestrator
  - id: AUD-001
    title: Immutable audit trail
    severity: critical
    statement: Critical actions MUST emit immutable audit events.
    enforced_by: observability
