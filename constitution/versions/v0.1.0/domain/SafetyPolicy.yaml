version: 0.1.0
incident_levels:
  - warning
  - critical

risk_categories:
  - behavioral
  - execution
  - resource
  - infrastructure

containment:
  warning:
    allowed_actions:
      - pause_agent
      - restrict_tool
  critical:
    allowed_actions:
      - pause_project
      - isolate_component
      - activate_safety_mode

monitoring_owners:
  behavioral: auditor
  execution: auditor
  resource: auditor
  infrastructure: administrator

pause_reporting:
  notify_ceo_on_any_agent_pause: true
  alert_owner_on_critical_impact: true
  required_fields:
    - event_id
    - trace_id
    - paused_agent_id
    - initiated_by
    - reason
    - critical_impact
    - timestamp

owner_override:
  enabled: true
  audit_required: true
  note: owner may override governance decisions with auditable justification.
