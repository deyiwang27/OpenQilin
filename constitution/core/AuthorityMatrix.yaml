    workforce: deny
default_behavior:
  unknown_role: deny
  unknown_authority: deny
phase_constraints:
  concierge_bootstrap:
    allowed_when:
      system_initialized: false
      ceo_handoff_complete: false
    forbidden_actions:
      - governance_override
      - project_execution
      - safety_policy_override
  concierge_passive:
    allowed_when:
      ceo_handoff_complete: true
transitions:
  - from: concierge_bootstrap
    to: concierge_passive
    trigger: CEO_HANDOFF_COMPLETE
    auto: true
  - from: concierge_passive
    to: concierge_bootstrap
    trigger: OWNER_APPROVED_REACTIVATION
    auto: false
