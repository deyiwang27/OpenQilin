version: 0.1.0
thresholds:
  soft_percent: 90
  hard_percent: 100
  daily_guardrail_percent: 15

checks:
  pre_dispatch_reservation_required: true
  in_flight_metering_required: true
  post_completion_reconciliation_required: true

enforcement:
  on_soft:
    action: notify
    notify:
      - cwo
      - ceo
  on_hard:
    actions:
      - block_new_execution
      - pause_project
    enforce_by: auditor
    escalate_to:
      - owner
    notify:
      - ceo

concurrency:
  reservation_required: true
  reservation_mode: atomic
