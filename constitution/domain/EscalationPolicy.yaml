      - specialist
      - project_manager
      - cwo
      - ceo
      - owner

  operational_coordination_failures:
    path:
      - specialist
      - domain_lead
      - project_manager
      - cwo
      - ceo

  strategic:
    path:
      - cso
      - ceo
      - owner

  governance:
