version: 0.1.0
thresholds:
  soft_percent: 85
  hard_percent: 100
  daily_guardrail_percent: 15
enforcement:
  on_soft:
    notify:
      - cwo
      - ceo
  on_hard:
    action: pause_project
    enforce_by: auditor
    notify:
      - owner
      - ceo
concurrency:
  reservation_required: true
  reservation_mode: atomic
