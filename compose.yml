name: openqilin

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["core", "full"]
    environment:
      POSTGRES_DB: openqilin
      POSTGRES_USER: openqilin
      POSTGRES_PASSWORD: openqilin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openqilin -d openqilin"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["core", "full"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  opa:
    image: openpolicyagent/opa:0.69.0-static
    profiles: ["core", "full"]
    # M12-WP1: serve the constitution Rego bundle from source tree.
    command: ["run", "--server", "--addr=0.0.0.0:8181", "--bundle", "/bundle"]
    volumes:
      - ./src/openqilin/policy_runtime_integration/rego:/bundle:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "version"]
      interval: 10s
      timeout: 5s
      retries: 12

  litellm:
    image: python:3.12-slim
    profiles: ["core", "full"]
    command: ["python", "-m", "http.server", "4000"]
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  otel_collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    profiles: ["obs", "full"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./ops/docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.53.2
    profiles: ["obs", "full"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./ops/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  tempo:
    image: grafana/tempo:2.5.0
    profiles: ["obs", "full"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./ops/docker/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.1.1
    profiles: ["obs", "full"]
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./ops/docker/loki.yaml:/etc/loki/loki.yaml:ro
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.1.4
    profiles: ["obs", "full"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    # M12-WP5: Mount provisioning directory to auto-configure data sources.
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki

  api_app:
    image: python:3.12-slim
    profiles: ["full"]
    working_dir: /workspace
    volumes:
      - .:/workspace
      - openqilin_system:/var/lib/openqilin
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --disable-pip-version-check --quiet -e /workspace && uvicorn openqilin.apps.api_app:app --host 0.0.0.0 --port 8000",
      ]
    ports:
      - "8000:8000"
    environment:
      OPENQILIN_DATABASE_URL: postgresql+psycopg://openqilin:openqilin@postgres:5432/openqilin
      OPENQILIN_RUNTIME_PERSISTENCE_ENABLED: "true"
      OPENQILIN_SYSTEM_ROOT: /var/lib/openqilin
      OPENQILIN_CONNECTOR_SHARED_SECRET: ${OPENQILIN_CONNECTOR_SHARED_SECRET:-dev-openqilin-secret}
      OPENQILIN_LLM_DEFAULT_ROUTING_PROFILE: ${OPENQILIN_LLM_DEFAULT_ROUTING_PROFILE:-dev_gemini_free}
      OPENQILIN_LLM_DEFAULT_MAX_TOKENS: ${OPENQILIN_LLM_DEFAULT_MAX_TOKENS:-1024}
      OPENQILIN_LLM_PROVIDER_BACKEND: ${OPENQILIN_LLM_PROVIDER_BACKEND:-gemini_flash_free}
      OPENQILIN_GEMINI_API_KEY: ${OPENQILIN_GEMINI_API_KEY:-}
      OPENQILIN_GEMINI_MAX_RETRIES: ${OPENQILIN_GEMINI_MAX_RETRIES:-2}
      OPENQILIN_GEMINI_RETRY_BASE_DELAY_SECONDS: ${OPENQILIN_GEMINI_RETRY_BASE_DELAY_SECONDS:-1.0}
      OPENQILIN_GEMINI_RETRY_MAX_DELAY_SECONDS: ${OPENQILIN_GEMINI_RETRY_MAX_DELAY_SECONDS:-8.0}
      OPENQILIN_GEMINI_FREE_PRIMARY_MODEL: ${OPENQILIN_GEMINI_FREE_PRIMARY_MODEL:-gemini-2.0-flash}
      OPENQILIN_GEMINI_FREE_FALLBACK_MODEL: ${OPENQILIN_GEMINI_FREE_FALLBACK_MODEL:-gemini-2.0-flash}
      # M12-WP1: OPA policy runtime wiring. Points api_app to the OPA container.
      OPENQILIN_OPA_URL: http://opa:8181
      # M12-WP4: Redis idempotency wiring.
      OPENQILIN_REDIS_URL: redis://redis:6379
      # M12-WP5: OTel export wiring. Points api_app to the OTel collector gRPC endpoint.
      OPENQILIN_OTLP_ENDPOINT: http://otel_collector:4317
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      litellm:
        condition: service_healthy

  orchestrator_worker:
    image: python:3.12-slim
    profiles: ["full"]
    working_dir: /workspace
    volumes:
      - .:/workspace
      - openqilin_system:/var/lib/openqilin
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --disable-pip-version-check --quiet -e /workspace && python -m openqilin.apps.orchestrator_worker",
      ]
    environment:
      OPENQILIN_RUNTIME_PERSISTENCE_ENABLED: "true"
      OPENQILIN_SYSTEM_ROOT: /var/lib/openqilin
      OPENQILIN_CONNECTOR_SHARED_SECRET: ${OPENQILIN_CONNECTOR_SHARED_SECRET:-dev-openqilin-secret}
      # LangSmith dev-time tracing (M11-WP4). Disabled by default.
      # Not a governance audit source — dev-time visibility only.
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-openqilin-dev}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; raise SystemExit(0 if Path('/tmp/openqilin.orchestrator_worker.ready').exists() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy
      api_app:
        condition: service_healthy

  communication_worker:
    image: python:3.12-slim
    profiles: ["full"]
    working_dir: /workspace
    volumes:
      - .:/workspace
      - openqilin_system:/var/lib/openqilin
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --disable-pip-version-check --quiet -e /workspace && python -m openqilin.apps.communication_worker",
      ]
    environment:
      OPENQILIN_RUNTIME_PERSISTENCE_ENABLED: "true"
      OPENQILIN_SYSTEM_ROOT: /var/lib/openqilin
      OPENQILIN_CONNECTOR_SHARED_SECRET: ${OPENQILIN_CONNECTOR_SHARED_SECRET:-dev-openqilin-secret}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; raise SystemExit(0 if Path('/tmp/openqilin.communication_worker.ready').exists() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api_app:
        condition: service_healthy

  discord_bot_worker:
    image: python:3.12-slim
    profiles: ["full"]
    working_dir: /workspace
    volumes:
      - .:/workspace
      - openqilin_system:/var/lib/openqilin
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --disable-pip-version-check --quiet -e /workspace && python -m openqilin.apps.discord_bot_worker",
      ]
    environment:
      OPENQILIN_RUNTIME_PERSISTENCE_ENABLED: "true"
      OPENQILIN_SYSTEM_ROOT: /var/lib/openqilin
      OPENQILIN_CONNECTOR_SHARED_SECRET: ${OPENQILIN_CONNECTOR_SHARED_SECRET:-dev-openqilin-secret}
      OPENQILIN_DISCORD_BOT_TOKEN: ${OPENQILIN_DISCORD_BOT_TOKEN:-}
      OPENQILIN_DISCORD_MULTI_BOT_ENABLED: ${OPENQILIN_DISCORD_MULTI_BOT_ENABLED:-false}
      OPENQILIN_DISCORD_WORKER_ROLE: ${OPENQILIN_DISCORD_WORKER_ROLE:-runtime_agent}
      OPENQILIN_DISCORD_ROLE_BOT_TOKENS_FILE: ${OPENQILIN_DISCORD_ROLE_BOT_TOKENS_FILE:-}
      OPENQILIN_DISCORD_ROLE_BOT_TOKENS_JSON: ${OPENQILIN_DISCORD_ROLE_BOT_TOKENS_JSON:-{}}
      OPENQILIN_DISCORD_REQUIRED_ROLE_BOTS_CSV: ${OPENQILIN_DISCORD_REQUIRED_ROLE_BOTS_CSV:-administrator,auditor,ceo,cwo,project_manager}
      OPENQILIN_DISCORD_CONTROL_PLANE_BASE_URL: ${OPENQILIN_DISCORD_CONTROL_PLANE_BASE_URL:-http://api_app:8000}
      OPENQILIN_DISCORD_COMMAND_PREFIX: ${OPENQILIN_DISCORD_COMMAND_PREFIX:-/oq}
      OPENQILIN_DISCORD_ACTOR_ROLE_DEFAULT: ${OPENQILIN_DISCORD_ACTOR_ROLE_DEFAULT:-owner}
      OPENQILIN_DISCORD_ACTOR_ROLE_MAP_JSON: ${OPENQILIN_DISCORD_ACTOR_ROLE_MAP_JSON:-{}}
      OPENQILIN_DISCORD_ALLOWED_GUILD_IDS_CSV: ${OPENQILIN_DISCORD_ALLOWED_GUILD_IDS_CSV:-}
      OPENQILIN_DISCORD_ALLOWED_CHANNEL_IDS_CSV: ${OPENQILIN_DISCORD_ALLOWED_CHANNEL_IDS_CSV:-}
      OPENQILIN_DISCORD_REQUEST_TIMEOUT_SECONDS: ${OPENQILIN_DISCORD_REQUEST_TIMEOUT_SECONDS:-20}
      OPENQILIN_DISCORD_RESPONSE_CHUNK_SIZE_CHARS: ${OPENQILIN_DISCORD_RESPONSE_CHUNK_SIZE_CHARS:-1900}
      OPENQILIN_DISCORD_RESPONSE_RETRY_ATTEMPTS: ${OPENQILIN_DISCORD_RESPONSE_RETRY_ATTEMPTS:-2}
      OPENQILIN_DISCORD_RESPONSE_RETRY_BASE_DELAY_SECONDS: ${OPENQILIN_DISCORD_RESPONSE_RETRY_BASE_DELAY_SECONDS:-0.5}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; raise SystemExit(0 if Path('/tmp/openqilin.discord_bot_worker.ready').exists() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      api_app:
        condition: service_healthy

  admin:
    image: python:3.12-slim
    profiles: ["full"]
    working_dir: /workspace
    volumes:
      - .:/workspace
    entrypoint: ["sh", "/workspace/ops/scripts/admin-entrypoint.sh"]
    command: ["bootstrap", "--smoke-in-process"]
    environment:
      OPENQILIN_DATABASE_URL: postgresql+psycopg://openqilin:openqilin@postgres:5432/openqilin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_healthy

  oq_doctor:
    image: python:3.12-slim
    profiles: ["doctor"]
    working_dir: /workspace
    volumes:
      - .:/workspace
    command:
      [
        "sh",
        "-lc",
        "python -m pip install --disable-pip-version-check --quiet -e /workspace && python -m openqilin.apps.oq_doctor",
      ]
    environment:
      OPENQILIN_DATABASE_URL: postgresql+psycopg://openqilin:openqilin@postgres:5432/openqilin
      OPENQILIN_REDIS_URL: redis://redis:6379
      OPENQILIN_OPA_URL: http://opa:8181
      OPENQILIN_OTLP_ENDPOINT: ${OPENQILIN_OTLP_ENDPOINT:-}
      OPENQILIN_GRAFANA_PUBLIC_URL: ${OPENQILIN_GRAFANA_PUBLIC_URL:-}
    depends_on:
      - postgres
      - redis
      - opa

volumes:
  postgres_data:
  openqilin_system:
