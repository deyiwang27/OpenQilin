name: Implementation Work Item
description: Track a v2 implementation feature/task with required governance fields.
title: "M?: <short implementation title>"
labels:
  - type:feature
body:
  - type: dropdown
    id: milestone
    attributes:
      label: Milestone
      description: Select the implementation milestone.
      options:
        - M11 Discord Grammar and Secretary Activation
        - M12 Infrastructure Wiring, Security Hardening, and CSO Activation
        - M13 Project Space Binding, Routing, and Orchestration Foundation
        - M14 Budget Persistence, Real Cost Model, and Grafana Dashboard
        - M15 Onboarding, Diagnostics, and Runtime Polish
        - M16 Open-Source and Sponsorship Readiness
    validations:
      required: true

  - type: input
    id: wp
    attributes:
      label: Work Package (WP)
      description: The WP this issue belongs to (e.g. M12-WP3).
      placeholder: M12-WP3
    validations:
      required: true

  - type: input
    id: goal
    attributes:
      label: Goal
      description: One-sentence outcome this issue delivers.
      placeholder: Wire the real OPA HTTP client and remove the always-allow stub.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: In-scope changes for this issue.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Testable criteria that must pass before closing. Maps directly to WP done-criteria.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Blocking issues, PRs, WP entry criteria, or environments.
      placeholder: "#12, M12-WP1 complete, local compose stack running"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence Links
      description: Add PR/test/trace/audit/migration links during implementation.
      placeholder: |
        - PR:
        - Test run:
        - Trace/Audit:
        - Alembic forward-apply (if DB migration):
        - OPA Rego unit tests (if Rego bundle changed):
    validations:
      required: true

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      description: Completion checklist for issue closure.
      value: |
        - [ ] Acceptance criteria satisfied.
        - [ ] Required tests/checks passed (ruff, mypy, pytest unit/component, relevant integration tests).
        - [ ] No `InMemory*` class introduced in any production code path.
        - [ ] WP task checkbox checked in the WP document after merge.
        - [ ] Evidence links updated.
        - [ ] `implementation/v2/planning/ImplementationProgress-v2.md` updated when WP/milestone status changes.
        - [ ] Repository consistency/governance check scope considered for this work item.
    validations:
      required: true

  - type: checkboxes
    id: policy_checks
    attributes:
      label: Policy Checks
      description: Confirm required workflow constraints before opening.
      options:
        - label: I will use branch format `<type>/<issue-id>-<short-slug>`.
          required: true
        - label: I will link this issue in the PR and include verification commands.
          required: true
        - label: I will not introduce any `InMemory*` class in a production code path.
          required: true
