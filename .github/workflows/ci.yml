name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "infra/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "ci/**"
  pull_request:
    branches:
      - main

jobs:

  # ── Job 1: Static checks ──────────────────────────────────────────────────
  # No services. Runs in parallel with unit-component.
  # Covers: lint, format, type-check, governance gates, Rego lint, ops scripts.
  static-checks:
    name: Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (frozen)
        run: uv sync --all-groups --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: InMemory production path check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' || true)
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD | grep '\.py$' || true)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No Python files changed. InMemory check: PASS"
            exit 0
          fi

          HITS=$(echo "$CHANGED" | xargs grep -l "class InMemory" 2>/dev/null \
              | grep -v "/testing/" \
              | grep -v "tests/" \
              | grep -v "test_" || true)

          if [ -n "$HITS" ]; then
            echo "ERROR: New InMemory* class introduced in production code path:"
            echo "$HITS"
            echo "Move stub implementations under a testing/ subpackage."
            exit 1
          fi
          echo "InMemory production path check: PASS"

      - name: Rego bundle lint
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/constitution:/constitution" \
            openpolicyagent/opa:0.69.0-static \
            check /constitution
          echo "Rego bundle lint: PASS"

      - name: Spec integrity checks
        run: uv run python ops/scripts/check_spec_integrity.py

      - name: Migration rollback readiness checks
        run: uv run python ops/scripts/check_migration_rollback_readiness.py

      - name: Release gate matrix checks
        run: uv run python ops/scripts/check_release_gate_matrix.py

      - name: Release artifact package checks
        run: uv run python ops/scripts/check_release_artifact_package.py

  # ── Job 2: Unit tests ─────────────────────────────────────────────────────
  # No services. Runs in parallel with static-checks.
  # unit/ — @pytest.mark.no_infra; pure logic, no I/O.
  # component/ tests are NOT infra-free: create_control_plane_app() runs a
  # hard OPA health check at startup (fail-closed). They run in job 3 instead.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    env:
      # Required by RuntimeSettings fail-closed guards even though no real
      # services are present. Unit tests never actually connect to these.
      OPENQILIN_DATABASE_URL: postgresql+psycopg://openqilin:openqilin@localhost:5432/openqilin
      OPENQILIN_REDIS_URL: redis://localhost:6379/0
      OPENQILIN_OPA_URL: http://localhost:8181

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (frozen)
        run: uv sync --all-groups --frozen

      - name: Unit tests
        run: uv run pytest tests/unit

  # ── Job 3: Component + Integration tests ─────────────────────────────────
  # Requires jobs 1 + 2 to pass first.
  # Spins up PostgreSQL, Redis, and OPA. Runs all infra-dependent test tiers.
  # component/ runs here because create_control_plane_app() performs a hard
  # OPA health check at startup (fail-closed); OPA must be live.
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: openqilin
          POSTGRES_PASSWORD: openqilin
          POSTGRES_DB: openqilin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Unprefixed: used by alembic and legacy tooling
      DATABASE_URL: postgresql+psycopg://openqilin:openqilin@localhost:5432/openqilin
      REDIS_URL: redis://localhost:6379/0
      OPA_URL: http://localhost:8181
      # OPENQILIN_ prefixed: read by RuntimeSettings (env_prefix="OPENQILIN_")
      OPENQILIN_DATABASE_URL: postgresql+psycopg://openqilin:openqilin@localhost:5432/openqilin
      OPENQILIN_REDIS_URL: redis://localhost:6379/0
      OPENQILIN_OPA_URL: http://localhost:8181

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (frozen)
        run: uv sync --all-groups --frozen

      - name: Start OPA server
        run: |
          docker compose up -d opa
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8181/health; then
              echo "OPA ready."
              break
            fi
            echo "Waiting for OPA... ($i)"
            sleep 2
          done

      - name: Alembic migration forward-apply
        run: |
          uv run alembic upgrade head
          echo "Alembic migration forward-apply: PASS"

      - name: Component tests
        run: uv run pytest tests/component

      - name: Contract and integration tests
        run: uv run pytest tests/contract tests/integration

      - name: Conformance tests
        run: uv run pytest tests/conformance
