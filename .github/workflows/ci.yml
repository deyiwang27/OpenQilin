name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
      - "test/**"
      - "ci/**"
  pull_request:
    branches:
      - main

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (frozen)
        run: uv sync --all-groups --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Spec integrity checks
        run: uv run python ops/scripts/check_spec_integrity.py

      - name: Migration rollback readiness checks
        run: uv run python ops/scripts/check_migration_rollback_readiness.py

      - name: Unit and component tests
        run: uv run pytest tests/unit tests/component

      - name: Contract and integration tests
        run: uv run pytest tests/contract tests/integration

      - name: Conformance tests
        run: uv run pytest tests/conformance
